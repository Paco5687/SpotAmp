; PlatformIO project for the RP2040 (Raspberry Pi Pico) controls board.
; Uses the Earle Philhower Arduino core for RP2040.

[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower

; USB CDC serial to the Pi at 115200 (see docs/serial-protocol.md)
monitor_speed = 115200
build_flags =
    -DSERIAL_BAUD=115200
