# go-librespot config TEMPLATE for the SpotAmp (audio engine).
# Copy to the Pi at ~/.config/go-librespot/config.yml and adjust.
# Verify key names against the go-librespot README — it is the source of truth:
#   https://github.com/devgianlu/go-librespot
#
# This is a *template*: it contains NO credentials. The first run performs a
# one-time interactive OAuth login and caches credentials.json alongside this
# file (that file is gitignored — never commit it).

device_name: "SpotAmp"
device_type: computer

credentials:
  type: interactive          # standalone browser login, then cached (no phone)

audio_backend: alsa
# Pick the real output device (raspi-config's default does NOT affect go-librespot).
# `plughw:CARD=Headphones` = Pi 3.5mm jack (find yours with `aplay -l`).
# The final build uses a USB DAC (HyperPixel's DPI takes the I2S GPIO).
audio_device: plughw:CARD=Headphones

server:                      # HTTP + WebSocket API the player app talks to
  enabled: true
  address: 127.0.0.1
  port: 3678
